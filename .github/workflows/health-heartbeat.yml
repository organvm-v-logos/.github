name: Health Heartbeat

on:
  schedule:
    - cron: "0 12 * * 1"  # Monday 12:00 UTC
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
      pull-requests: read

    steps:
      - name: Check pipeline health
        env:
          GH_TOKEN: ${{ github.token }}
          # Optional cross-repo token with `actions:write` on the upstream
          # content repos. When present, the heartbeat self-heals stalled
          # scheduled pipelines (re-enable + re-dispatch). When absent, it still
          # reports but leaves a manual re-enable instruction in the issue.
          DISPATCH_TOKEN: ${{ secrets.PIPELINE_DISPATCH_TOKEN }}
        run: |
          set -uo pipefail
          FAILURES=""
          ACTIONS=""
          WEEK_AGO=$(date -u -v-7d +%Y-%m-%dT00:00:00Z 2>/dev/null || date -u -d "7 days ago" +%Y-%m-%dT00:00:00Z)

          # Attempt to recover a stalled scheduled workflow. GitHub auto-disables
          # `cron` triggers after 60 days of repository inactivity, which is the
          # usual cause of a "none" (no-run-in-window) result for these weekly
          # pipelines. Re-enabling reactivates the schedule; the dispatch run
          # both backfills this week and counts as activity that keeps the cron
          # alive for the next 60 days.
          remediate() {
            local repo="$1"
            local workflow="$2"

            if [ -z "${DISPATCH_TOKEN:-}" ]; then
              ACTIONS="$ACTIONS\n  - $repo/$workflow: PIPELINE_DISPATCH_TOKEN secret not set — re-enable + re-run manually (see runbook)"
              return
            fi

            GH_TOKEN="$DISPATCH_TOKEN" gh workflow enable "$workflow" --repo "organvm-v-logos/$repo" 2>/dev/null || true

            if GH_TOKEN="$DISPATCH_TOKEN" gh workflow run "$workflow" --repo "organvm-v-logos/$repo" 2>/dev/null; then
              ACTIONS="$ACTIONS\n  - $repo/$workflow: re-enabled and re-dispatched automatically"
              echo "REMEDIATE: re-dispatched $repo/$workflow"
            else
              ACTIONS="$ACTIONS\n  - $repo/$workflow: auto re-dispatch failed — check token scope and upstream secrets"
              echo "REMEDIATE: failed to re-dispatch $repo/$workflow"
            fi
          }

          check_workflow() {
            local repo="$1"
            local workflow="$2"
            local label="$3"

            RESULT=$(gh api "repos/organvm-v-logos/$repo/actions/workflows/$workflow/runs?per_page=1&created=>=$WEEK_AGO" \
              --jq '.workflow_runs[0].conclusion // "none"' 2>/dev/null || echo "error")

            if [ "$RESULT" != "success" ]; then
              FAILURES="$FAILURES\n- **$label** ($repo/$workflow): $RESULT"
              echo "FAIL: $label = $RESULT"
              # "none" => no run in window (cron likely auto-disabled);
              # "failure" => ran but errored. Both are worth a self-heal attempt.
              if [ "$RESULT" = "none" ] || [ "$RESULT" = "failure" ]; then
                remediate "$repo" "$workflow"
              fi
            else
              echo "OK: $label"
            fi
          }

          # Check weekly pipelines
          check_workflow "analytics-engine" "weekly-metrics.yml" "Weekly Metrics"
          check_workflow "reading-observatory" "weekly-feeds.yml" "Weekly Feeds"
          check_workflow "essay-pipeline" "weekly-intelligence.yml" "Weekly Intelligence"

          # Check for merged essay PRs this week
          MERGED_COUNT=$(gh api "repos/organvm-v-logos/public-process/pulls?state=closed&sort=updated&direction=desc&per_page=20" \
            --jq "[.[] | select(.merged_at != null and .merged_at >= \"$WEEK_AGO\" and (.labels | any(.name == \"auto-draft\")))] | length" 2>/dev/null || echo "0")

          if [ "$MERGED_COUNT" = "0" ]; then
            FAILURES="$FAILURES\n- **Essay Publication**: No auto-draft PRs merged this week"
            echo "FAIL: No essays merged"
          else
            echo "OK: $MERGED_COUNT essay PR(s) merged"
          fi

          # All clear
          if [ -z "$FAILURES" ]; then
            echo "All health checks passed"
            exit 0
          fi

          # Default remediation note when nothing was auto-fixed.
          if [ -z "$ACTIONS" ]; then
            ACTIONS="\n  - No automatic remediation was applicable for the failing checks."
          fi

          BODY=$(cat <<EOF
          ## ORGAN-V Autonomous Pipeline Health Check Failed

          The following checks failed during the weekly heartbeat:

          $(echo -e "$FAILURES")

          ### Automatic remediation attempted
          $(echo -e "$ACTIONS")

          ### Diagnostics
          - Check run: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          - Period checked: since $WEEK_AGO
          - A \`none\` result means no run occurred in the window — the most common
            cause is GitHub auto-disabling the \`cron\` schedule after 60 days of
            repository inactivity. A \`failure\` result means the run executed but
            errored (usually expired secrets).

          ### Resolution
          1. If a check shows \`none\`, confirm the upstream scheduled workflow is
             enabled: \`gh workflow enable <workflow> --repo organvm-v-logos/<repo>\`
          2. Trigger a manual run to backfill and re-arm the schedule:
             \`gh workflow run <workflow> --repo organvm-v-logos/<repo>\`
          3. If a check shows \`failure\`, inspect logs and verify secrets/API keys.
          4. To make recovery automatic, set the \`PIPELINE_DISPATCH_TOKEN\` org
             secret (a token with \`actions:write\` on the content repos).
          5. Full procedure: \`docs/ops/pipeline-health-runbook.md\`

          ---
          *Generated by health-heartbeat workflow*
          EOF
          )

          # Avoid filing a new issue every week: update the existing open
          # health-check issue if one is already open.
          EXISTING=$(gh issue list --repo organvm-v-logos/.github \
            --label health-check --state open --json number --jq '.[0].number // empty' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo organvm-v-logos/.github --body "$BODY"
            echo "Health check FAILED — updated existing issue #$EXISTING"
          else
            gh issue create --repo organvm-v-logos/.github \
              --title "[Health] Pipeline stall detected — $(date -u +%Y-%m-%d)" \
              --body "$BODY" \
              --label automation \
              --label health-check
            echo "Health check FAILED — issue created"
          fi

          exit 1
